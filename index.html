<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legxi AI</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
      color: #fff;
    }
    .container h1 {
      margin-bottom: 15px;
      font-size: 2.5rem;
    }
    .container p {
      margin-bottom: 30px;
      font-size: 1.2rem;
    }
    .btn {
      display: block;
      width: 220px;
      margin: 12px auto;
      padding: 12px;
      background: #fff;
      color: #2575fc;
      font-weight: bold;
      border-radius: 30px;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn:hover {
      background: #2575fc;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Legxi AI</h1>
    <p>Your Creative AI Studio 🚀</p>
    <a href="#" class="btn">Sign Up with Gmail</a>
    <a href="#" class="btn">Login with Phone</a>
  </div>
</body>
</html>
