<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legxi AI - Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid white;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: #2a5298;
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>Welcome to Legxi AI</h1>
  <p>Hello, User 👋</p>
  
  <div class="menu">
    <button class="btn">AI Chat</button>
    <button class="btn">Profile</button>
    <button class="btn">Settings</button>
  </div>

  <footer>© 2025 Legxi AI</footer>
</body>
</html>
